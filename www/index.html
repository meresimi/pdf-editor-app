<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF Editor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>PDF Editor</h1>
        <button id="openPdfBtn" class="btn">📄 Open PDF</button>
        
        <div id="pdfViewer" style="display: none;">
            <canvas id="pdfCanvas"></canvas>
            <div id="pageControls">
                <button id="prevPage" class="btn">Previous</button>
                <span id="pageInfo"></span>
                <button id="nextPage" class="btn">Next</button>
            </div>
            <button id="editFormBtn" class="btn">Edit Form Fields</button>
            <button id="saveBtn" class="btn">Save PDF</button>
        </div>

        <div id="formEditor" style="display: none;">
            <h2>Form Fields</h2>
            <div id="formFields"></div>
            <button id="applyChangesBtn" class="btn">Apply Changes</button>
            <button id="cancelEditBtn" class="btn">Cancel</button>
        </div>
    </div>

    <!-- Use CDN for PDF libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <script type="text/javascript" src="cordova.js"></script>
    <script src="js/pdfHandler.js"></script>
    <script src="js/formEditor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
